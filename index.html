<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyron Vereen | Professor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 0.5rem; color: #2c3e50; }
        p { margin: 0.5rem 0; color: #7f8c8d; }
        .nav-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 20px;
            background-color: #2980b9;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .nav-link:hover { background-color: #3498db; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Tyron Vereen</h1>
        <p><strong>Professor</strong></p>
        <p>Houston City College</p>
        
        <a href="government.html" id="navButton" class="nav-link">Go to Government Page</a>
    </div>

    <script>
        // JavaScript link/interaction
        const navButton = document.getElementById('navButton');
        
        navButton.addEventListener('click', (e) => {
            console.log("Navigating to government.html");
            // Navigation happens automatically via href
        });
    </script>
</body>
</html>
